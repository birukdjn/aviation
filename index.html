<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Video</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Video Background */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay */
        .overlay {
            position: relative;
            z-index: 1;
            height: 100%;
        }

        /* Sound Button (Bottom Right) */
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
            transition: 0.3s;
        }

        .sound-toggle:hover {
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <!-- Video -->
    <video id="bgVideo" autoplay muted loop playsinline preload="auto">
        <source src="video2.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
    </video>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Sound Icon -->
    <div class="sound-toggle" onclick="toggleSound()" id="soundBtn">
        🔇
    </div>

    <script>
        const video = document.getElementById("bgVideo");
        const btn = document.getElementById("soundBtn");

        function toggleSound() {
            video.muted = !video.muted;

            if (video.muted) {
                btn.textContent = "🔇";
            } else {
                btn.textContent = "🔊";
                video.play();
            }
        }

        // Optional: first interaction enables sound automatically
        document.addEventListener("click", () => {
            if (video.muted) {
                video.muted = false;
                btn.textContent = "🔊";
                video.play();
            }
        }, { once: true });
    </script>

</body>
</html>
